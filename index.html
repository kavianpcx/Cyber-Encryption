<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
    <title>Cyber Encryption (Offline Pro)</title>
    <style>
      :root {
        --primary: #6c5dff;
        --primary-2: #8f82ff;
        --accent: #4e43ff;

        --bg: #030307;
        --bg-2: #07070f;
        --surface: rgba(255, 255, 255, 0.035);
        --surface-2: rgba(255, 255, 255, 0.05);

        --border: rgba(255, 255, 255, 0.1);
        --border-strong: rgba(143, 130, 255, 0.45);

        --text: #f5f5ff;
        --muted: #a9add8;

        --ok: #19c37d;
        --danger: #ff5c7a;

        --radius-xl: 22px;
        --radius-lg: 16px;
        --radius-md: 12px;

        --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.45);
        --shadow-neon:
          0 0 0 1px rgba(108, 93, 255, 0.25),
          0 10px 30px rgba(108, 93, 255, 0.18);

        --tr-fast: 180ms;
        --tr: 320ms cubic-bezier(0.2, 0.7, 0.2, 1);
        --tr-slow: 420ms cubic-bezier(0.18, 0.78, 0.2, 1);

        --sp-1: 6px;
        --sp-2: 10px;
        --sp-3: 14px;
        --sp-4: 18px;
        --sp-5: 22px;
      }

      body.pink {
        --primary: #ff4fa2;
        --primary-2: #ff7fbe;
        --accent: #ff5fa9;

        --bg: #140b12;
        --bg-2: #1b0f18;
        --surface: rgba(255, 255, 255, 0.06);
        --surface-2: rgba(255, 255, 255, 0.085);

        --border: rgba(255, 255, 255, 0.14);
        --border-strong: rgba(255, 127, 190, 0.62);

        --text: #ffffff;
        --muted: #f0c6dd;

        --shadow-soft: 0 16px 45px rgba(0, 0, 0, 0.5);
        --shadow-neon:
          0 0 0 1px rgba(255, 127, 190, 0.35),
          0 10px 36px rgba(255, 95, 169, 0.28);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
      input, textarea, button, select { font-size: 16px; }

      body {
        margin: 0;
        color: var(--text);
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(1200px 800px at 10% -10%, rgba(108,93,255,0.18), transparent 55%),
          radial-gradient(900px 600px at 100% 0%, rgba(78,67,255,0.14), transparent 55%),
          linear-gradient(160deg, var(--bg), var(--bg-2));
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 28px 16px calc(28px + env(safe-area-inset-bottom));
        transition: background var(--tr-slow), color var(--tr);
        overscroll-behavior: none;
      }

      .app {
        width: 100%;
        max-width: 920px;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: var(--shadow-soft);
        overflow: hidden;
        transition: all var(--tr-slow);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--sp-3) var(--sp-4);
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
        gap: var(--sp-2);
        flex-wrap: wrap;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: var(--sp-2);
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .brand-dot {
        width: 10px; height: 10px; border-radius: 50%;
        background: linear-gradient(135deg, var(--primary-2), var(--primary));
        box-shadow: 0 0 18px rgba(108, 93, 255, 0.75);
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: var(--sp-2);
        margin-left: auto;
        flex-wrap: wrap;
      }

      .badge {
        font-size: 12px;
        color: #d9d6ff;
        border: 1px solid rgba(143, 130, 255, 0.35);
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(108, 93, 255, 0.12);
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .badge svg {
        width: 12px;
        height: 12px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .badge-ok {
        color: #eafff5;
        border-color: rgba(25,195,125,0.5);
        background: rgba(25,195,125,0.18);
      }

      .toggle {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border-radius: 999px;
        padding: 7px 10px;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        font-size: 12px;
        transition: all var(--tr);
      }
      .toggle:hover { background: rgba(255, 255, 255, 0.08); }

      .content {
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--sp-3);
        padding: var(--sp-4);
      }
      @media (min-width: 920px) {
        .content { grid-template-columns: 1fr 1fr; }
        .full { grid-column: 1/-1; }
      }

      .card {
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        background: var(--surface);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        padding: var(--sp-3);
        transition: all var(--tr);
      }
      .card.passphrase-active {
        border-color: rgba(25,195,125,0.5);
        box-shadow: 0 0 0 1px rgba(25,195,125,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
      }

      .card h3 {
        margin: 0 0 var(--sp-2);
        font-size: 13px;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.9px;
      }

      .keyBox, .fileInfo {
        width: 100%;
        min-height: 52px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px dashed rgba(143, 130, 255, 0.35);
        background: rgba(108, 93, 255, 0.08);
        color: #d8d3ff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        user-select: none;
      }
      .fileInfo { cursor: pointer; }
      .fileInfo:focus-visible { outline: 2px solid var(--border-strong); outline-offset: 2px; }
      .fileInfo.dragover {
        border-color: var(--border-strong);
        box-shadow: var(--shadow-neon);
        background: rgba(255,255,255,0.08);
      }

      .fileInfo-inner {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: 100%;
      }
      .fileInfo-icon {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex: none;
      }
      .fileInfo-text {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 100%;
      }

      .file-info-wrap { position: relative; }
      .file-clear {
        position: absolute;
        top: -8px; right: 8px;
        width: 28px; height: 28px;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.18);
        background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
        color: #fff;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all var(--tr-fast);
        box-shadow: 0 6px 16px rgba(0,0,0,0.25);
        backdrop-filter: blur(8px);
      }
      .file-clear:hover {
        background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      }
      .file-card.has-file .file-clear { display: inline-flex; }

      textarea {
        width: 100%;
        min-height: 170px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface-2);
        color: var(--text);
        padding: 12px 13px;
        resize: vertical;
        outline: none;
        line-height: 1.55;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        transition: border-color var(--tr), box-shadow var(--tr), background var(--tr);
      }
      textarea:focus {
        border-color: var(--border-strong);
        box-shadow: var(--shadow-neon);
        background: rgba(255, 255, 255, 0.08);
      }

      .row { display: flex; gap: var(--sp-2); flex-wrap: wrap; }

      .row-3 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0,1fr));
        gap: var(--sp-2);
      }
      .row-3 .btn { width: 100%; }
      @media (max-width: 820px) {
        .row-3 { grid-template-columns: repeat(2, minmax(0,1fr)); }
        .row-3 .btn:nth-child(3) { grid-column: 1 / -1; }
      }
      @media (max-width: 520px) {
        .row-3 { grid-template-columns: 1fr; }
        .row-3 .btn:nth-child(3) { grid-column: auto; }
      }

      .btn {
        appearance: none;
        border: none;
        border-radius: 12px;
        padding: 12px 14px;
        font-weight: 650;
        color: white;
        cursor: pointer;
        transition: transform var(--tr), filter var(--tr), box-shadow var(--tr), opacity var(--tr), background var(--tr);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        touch-action: manipulation;
      }
      .btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex: none; }
      .btn:active { transform: translateY(1px) scale(0.99); }
      .btn:hover { filter: brightness(1.06); }
      .btn[disabled] { opacity: 0.65; cursor: not-allowed; }

      .btn-primary {
        background: linear-gradient(135deg, var(--primary-2), var(--primary));
        box-shadow: 0 6px 20px rgba(108, 93, 255, 0.35);
      }
      .btn-ghost { background: rgba(255, 255, 255, 0.06); border: 1px solid var(--border); color: #ecebff; }
      .btn-wide { flex: 1; min-width: 140px; }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--sp-2);
      }
      .actions .btn { width: 100%; padding: 13px; min-height: 44px; }

      .spinner {
        width: 15px; height: 15px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: #fff;
        border-radius: 50%;
        display: none;
        animation: spin 0.8s linear infinite;
      }
      .btn.loading .spinner { display: inline-block; }
      .btn.loading .label { opacity: 0.9; }
      .btn.loading svg { display: none; }
      .hidden-input { display: none; }

      @keyframes spin { to { transform: rotate(360deg); } }

      .footer {
        padding: 10px 16px 16px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%) translateY(8px);
        opacity: 0;
        pointer-events: none;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: #fff;
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 13px;
        box-shadow: 0 10px 26px rgba(78, 67, 255, 0.4);
        transition: all var(--tr);
        z-index: 999;
      }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      .select-wrap {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: var(--sp-2);
        margin-bottom: var(--sp-2);
        flex-wrap: wrap;
      }
      .select-btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.06);
        color: var(--text);
        cursor: pointer;
        min-width: 180px;
        transition: border-color var(--tr), box-shadow var(--tr), background var(--tr);
      }
      .select-btn:focus {
        outline: none;
        border-color: var(--border-strong);
        box-shadow: var(--shadow-neon);
      }
      .select-caret {
        margin-left: auto;
        width: 10px; height: 10px;
        border: 2px solid currentColor;
        border-left: 0; border-top: 0;
        transform: rotate(45deg);
        transition: transform var(--tr);
        opacity: .8;
      }
      .select-wrap.open .select-caret { transform: rotate(-135deg); }

      .select-menu {
        position: absolute;
        top: 100%;
        left: 0;
        margin-top: 8px;
        min-width: 220px;
        padding: 8px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(9, 12, 20, 0.92);
        box-shadow: 0 12px 30px rgba(0,0,0,0.35);
        backdrop-filter: blur(16px);
        z-index: 50;
        opacity: 0;
        transform: translateY(-4px);
        pointer-events: none;
        transition: all var(--tr);
      }
      body.pink .select-menu { background: rgba(20, 10, 16, 0.92); }
      .select-wrap.open .select-menu {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }
      @media (min-width: 900px) {
        .select-menu { transform: translateY(-6px) translateX(6px); }
        .select-wrap.open .select-menu { transform: translateY(0) translateX(6px); }
      }

      .select-item {
        padding: 10px 12px;
        border-radius: 10px;
        color: var(--text);
        cursor: pointer;
        transition: background var(--tr-fast), color var(--tr-fast);
      }
      .select-item:hover { background: rgba(255,255,255,0.08); }
      .select-item.active {
        background: linear-gradient(135deg, rgba(108,93,255,0.35), rgba(108,93,255,0.15));
        border: 1px solid rgba(108,93,255,0.35);
      }

      .pass-wrap {
        display: none;
        gap: 8px;
        align-items: center;
        margin-top: var(--sp-2);
        animation: fadeSlide var(--tr) ease;
      }
      .pass-wrap.show { display: flex; }
      .pass-input {
        flex: 1;
        background: rgba(255,255,255,0.06);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        outline: none;
        transition: border-color var(--tr), box-shadow var(--tr), background var(--tr);
      }
      .pass-input:focus {
        border-color: rgba(25,195,125,0.6);
        box-shadow: 0 0 0 1px rgba(25,195,125,0.25), 0 10px 20px rgba(25,195,125,0.2);
      }
      .pass-toggle {
        border: 1px solid var(--border);
        background: rgba(255,255,255,0.06);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        cursor: pointer;
      }

      .fade-slide { animation: fadeSlide var(--tr) ease; }
      @keyframes fadeSlide {
        from { opacity: 0; transform: translateY(-6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .hidden { display: none !important; }
      .disabled { opacity: 0.45; pointer-events: none; }

      .file-card { position: relative; }
      .drop-overlay {
        position: absolute;
        inset: 10px;
        border-radius: 14px;
        border: 2px dashed var(--border-strong);
        background: rgba(255, 255, 255, 0.06);
        display: none;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: var(--text);
        font-weight: 600;
        pointer-events: none;
        box-shadow: var(--shadow-neon);
      }
      .file-card.dragging .drop-overlay { display: flex; }

      /* ===== Advanced file progress overlay (styled to match) ===== */
      .file-progress-overlay {
        position: fixed;
        inset: 0;
        z-index: 1100;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,.45);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      .file-progress-card {
        width: min(380px, calc(100% - 24px));
        border: 1px solid var(--border);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
        box-shadow: var(--shadow-soft);
        padding: 18px 16px 16px;
        text-align: center;
        position: relative;
      }
      .fp-ring-wrap {
        width: 150px;
        height: 150px;
        margin: 8px auto 10px;
        position: relative;
      }
      .fp-ring-svg {
        width: 100%;
        height: 100%;
        transform: rotate(-90deg);
      }
      .fp-ring-track {
        fill: none;
        stroke: rgba(255,255,255,.18);
        stroke-width: 10;
      }
      .fp-ring-bar {
        fill: none;
        stroke: var(--primary-2);
        stroke-width: 10;
        stroke-linecap: round;
        transition: stroke-dashoffset 260ms ease, stroke 300ms ease;
        filter: drop-shadow(0 0 10px rgba(108,93,255,.35));
      }
      .fp-center {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        gap: 4px;
      }
      .fp-percent {
        font-weight: 800;
        font-size: 30px;
        letter-spacing: .3px;
        background: linear-gradient(135deg, #ffffff, #cdd1ff 45%, #8f82ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 6px 18px rgba(108,93,255,.35);
        line-height: 1;
      }
      .fp-caption {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: .6px;
        text-transform: uppercase;
      }
      .fp-check {
        width: 46px;
        height: 46px;
        opacity: 0;
        transform: scale(.7);
        transition: all 320ms cubic-bezier(.2,.7,.2,1);
      }
      .fp-check path {
        fill: none;
        stroke: #fff;
        stroke-width: 3.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 36;
        stroke-dashoffset: 36;
        transition: stroke-dashoffset 380ms ease 100ms;
      }
      .file-progress-card.done .fp-ring-bar {
        stroke: var(--ok);
        filter: drop-shadow(0 0 10px rgba(25,195,125,.35));
      }
      .file-progress-card.done .fp-percent,
      .file-progress-card.done .fp-caption {
        opacity: 0;
        transform: scale(.86);
        transition: all 220ms ease;
      }
      .file-progress-card.done .fp-check {
        opacity: 1;
        transform: scale(1);
      }
      .file-progress-card.done .fp-check path {
        stroke-dashoffset: 0;
      }
      .fp-title {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .fp-sub {
        font-size: 12px;
        color: var(--muted);
      }
      .fp-cancel {
        position: absolute;
        top: 10px; right: 10px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.18);
        background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
        color: #fff;
        cursor: pointer;
        font-size: 12px;
        transition: all var(--tr-fast);
        box-shadow: 0 6px 16px rgba(0,0,0,0.25);
        backdrop-filter: blur(8px);
      }
      .fp-cancel:hover {
        background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.08));
      }

      .download-prompt {
        position: fixed; inset: 0;
        display: flex; align-items: flex-end; justify-content: center;
        background: rgba(0,0,0,0.45);
        backdrop-filter: blur(6px);
        z-index: 1000; padding: 16px;
      }
      .download-card {
        width: min(520px, 100%);
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: var(--shadow-soft);
      }
      .download-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
      .download-name { font-size: 12px; color: var(--muted); margin-bottom: 12px; word-break: break-all; }
      .download-actions { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-2); }
      @media (max-width: 520px) { .download-actions { grid-template-columns: 1fr; } }

      @media (max-width: 600px) {
        .content { padding: var(--sp-3); gap: var(--sp-3); }
        .card { padding: var(--sp-3); }
        .actions { grid-template-columns: 1fr; }
        .btn-wide { min-width: 100%; }
        textarea { min-height: 140px; }
      }

      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; transition: none !important; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">
          <span class="brand-dot"></span>
          <span>Cyber Encryption</span>
        </div>

        <div class="topbar-right">
          <span class="badge">AES-256-GCM</span>
          <span id="passBadge" class="badge badge-ok hidden">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="5" y="10" width="14" height="10" rx="2"></rect>
              <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
            </svg>
            Passphrase
          </span>
          <button id="themeToggle" class="toggle" type="button" title="Toggle Dark/Pink">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 1 0 9.8 9.8z" />
            </svg>
            <span id="themeLabel">Dark</span>
          </button>
        </div>
      </div>

      <div class="content">
        <section id="keyCard" class="card full">
          <h3>Key Management</h3>

          <div class="select-wrap" id="keyModeWrap">
            <svg class="keymode-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="8" cy="15" r="3" />

              <span id="keyModeLabel">Default Key</span>

            </button>

            <div id="keyModeMenu" class="select-menu" role="listbox" aria-label="Key Mode">

            <input id="passInput" class="pass-input" type="password" autocomplete="new-password" placeholder="Enter your passphrase..." />
            <button id="passToggle" class="pass-toggle" type="button" title="Show/Hide">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>

          <div id="keyBox" class="keyBox">No key generated</div>
          <div id="keyActions" class="row row-3 fade-slide" style="margin-top: 10px">
            <button class="btn btn-primary btn-wide" onclick="generateKey()">
              <svg viewBox="0 0 24 24"><circle cx="7.5" cy="15.5" r="3.5" /><path d="M11 13l9-9M17 4h3v3M14 7l3 3" /></svg>
              <span class="label">Generate Key</span>
            </button>
            <button class="btn btn-ghost btn-wide" onclick="copyKey()">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2" /><rect x="4" y="4" width="11" height="11" rx="2" /></svg>
              <span class="label">Copy Key</span>

            <button class="btn btn-ghost btn-wide" onclick="importKey()">
              <svg viewBox="0 0 24 24"><path d="M12 3v12" /><path d="M7 10l5 5 5-5" /><path d="M4 21h16" /></svg>

        <section class="card">
          <h3>Input</h3>
          <textarea id="inputText" placeholder="Type or paste plain/cipher text..." autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
          <div class="row" style="margin-top: 10px">
            <button class="btn btn-ghost btn-wide" onclick="clearInput()">
              <svg viewBox="0 0 24 24"><path d="M16 3l5 5-9.5 9.5a2 2 0 0 1-1.4.6H5a2 2 0 0 1-2-2v-5.1a2 2 0 0 1 .6-1.4L13 0z" /><path d="M7 17h14" /></svg>
              <span class="label">Clear Input</span>
            </button>

        <section class="card">
          <h3>Output</h3>
          <textarea id="outputText" readonly placeholder="Result will appear here..." autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
          <div class="row" style="margin-top: 10px">
            <button class="btn btn-ghost btn-wide" onclick="copyOutput()">
              <svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2" /><rect x="4" y="4" width="11" height="11" rx="2" /></svg>

          <h3>Actions</h3>
          <div class="actions">

              <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2" /><path d="M8 11V8a4 4 0 1 1 8 0v3" /></svg>
              <span class="spinner"></span><span class="label">Encrypt</span>
            </button>
            <button id="decryptBtn" class="btn btn-primary" onclick="decryptText()">
              <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2" /><path d="M8 11V8a4 4 0 0 1 7-2" /></svg>
              <span class="spinner"></span><span class="label">Decrypt</span>

        <section id="fileCard" class="card full file-card">
          <h3>File Encryption (Offline)</h3>
          <input id="fileInput" class="hidden-input" type="file" accept="*/*" />

          <div class="file-info-wrap">

                <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2" /><path d="M8 11V8a4 4 0 1 1 8 0v3" /></svg>
              <span class="spinner"></span><span class="label">Encrypt File</span>
            </button>
            <button id="decryptFileBtn" class="btn btn-primary btn-wide" onclick="decryptFile()">
                 <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2" /><path d="M8 11V8a4 4 0 0 1 7-2" /></svg>
              <span class="spinner"></span><span class="label">Decrypt File</span>
            </button>

          <div id="dropOverlay" class="drop-overlay">Drop file to add</div>

      <div class="footer">Generated by Kavian</div>
    </div>

    <div id="toast" class="toast"></div>

    <div id="downloadPrompt" class="download-prompt hidden" role="dialog" aria-modal="true">
      <div class="download-card">
        <div class="download-title">Download Ready</div>
        <div id="downloadName" class="download-name"></div>
        <div class="row download-actions">
          <a id="downloadLink" class="btn btn-primary btn-wide" download>Download</a>
          <button id="downloadCancel" class="btn btn-ghost btn-wide" type="button">Cancel</button>
        </div>
      </div>
    </div>

    <div id="fileProgressOverlay" class="file-progress-overlay hidden" aria-hidden="true">
      <div id="fileProgressCard" class="file-progress-card">
        <button id="fpCancel" class="fp-cancel" type="button">Cancel</button>
        <div class="fp-ring-wrap">
          <svg class="fp-ring-svg" viewBox="0 0 150 150" aria-hidden="true">
            <circle class="fp-ring-track" cx="75" cy="75" r="58"></circle>
            <circle id="fpRingBar" class="fp-ring-bar" cx="75" cy="75" r="58"></circle>
          </svg>
          <div class="fp-center">
            <div id="fpPercent" class="fp-percent">0%</div>
            <div class="fp-caption">Progress</div>
            <svg class="fp-check" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 13l4 4L19 7"></path>
            </svg>
          </div>
        </div>
        <div id="fpTitle" class="fp-title">Processing file...</div>
        <div class="fp-sub">Please keep this tab open</div>
      </div>
    </div>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const keyCard = document.getElementById("keyCard");
        const keyBox = document.getElementById("keyBox");
        const keyActions = document.getElementById("keyActions");

        const keyModeWrap = document.getElementById("keyModeWrap");
        const keyModeBtn = document.getElementById("keyModeBtn");
        const keyModeMenu = document.getElementById("keyModeMenu");
        const keyModeLabel = document.getElementById("keyModeLabel");

        const passWrap = document.getElementById("passWrap");
        const passInput = document.getElementById("passInput");
        const passToggle = document.getElementById("passToggle");
        const passBadge = document.getElementById("passBadge");

        const inputText = document.getElementById("inputText");
        const outputText = document.getElementById("outputText");
        const encryptBtn = document.getElementById("encryptBtn");
        const decryptBtn = document.getElementById("decryptBtn");
        const encryptFileBtn = document.getElementById("encryptFileBtn");
        const decryptFileBtn = document.getElementById("decryptFileBtn");
        const fileInput = document.getElementById("fileInput");
        const fileInfo = document.getElementById("fileInfo");
        const fileInfoLabel = document.getElementById("fileInfoLabel");
        const fileCard = document.getElementById("fileCard");
        const fileClearBtn = document.getElementById("fileClearBtn");

        const themeToggle = document.getElementById("themeToggle");
        const themeLabel = document.getElementById("themeLabel");

        const downloadPrompt = document.getElementById("downloadPrompt");
        const downloadName = document.getElementById("downloadName");
        const downloadLink = document.getElementById("downloadLink");
        const downloadCancel = document.getElementById("downloadCancel");

        const fileProgressOverlay = document.getElementById("fileProgressOverlay");
        const fileProgressCard = document.getElementById("fileProgressCard");
        const fpRingBar = document.getElementById("fpRingBar");
        const fpPercent = document.getElementById("fpPercent");
        const fpTitle = document.getElementById("fpTitle");
        const fpCancel = document.getElementById("fpCancel");

        let cryptoKey;
        let selectedFile = null;
        let keyMode = "default";
        let downloadURL = null;

        const defaultFileText = "Click to choose or drag & drop";
        const FILE_MAGIC = new Uint8Array([0x43, 0x45, 0x31]);
        const MODE_DEFAULT = 0x00;
        const MODE_PASSPHRASE = 0x01;
        const MB = 1024 * 1024;
        const GB = 1024 * 1024 * 1024;
        const LARGE_FILE_PROGRESS_THRESHOLD = 64 * MB;
        const ABSOLUTE_HARD_CAP = 2 * GB;

        const FP_RADIUS = 58;
        const FP_CIRC = 2 * Math.PI * FP_RADIUS;
        fpRingBar.style.strokeDasharray = `${FP_CIRC}`;
        fpRingBar.style.strokeDashoffset = `${FP_CIRC}`;

        let cachedDeviceProfile = null;
        let currentFileOp = null;

        if (!window.isSecureContext || !crypto?.subtle) showToast("Web Crypto unavailable in this context");

        function showToast(msg) {
          const t = document.getElementById("toast");
          t.textContent = msg;
          t.classList.add("show");
          setTimeout(() => t.classList.remove("show"), 1800);
        }
        window.showToast = showToast;

        function updateThemeLabel() {
          themeLabel.textContent = document.body.classList.contains("pink") ? "Pink" : "Dark";
        }
        function applyTheme(theme) {
          document.body.classList.remove("pink");
          if (theme === "pink") document.body.classList.add("pink");
          updateThemeLabel();
        }
        applyTheme(localStorage.getItem("ce_theme") || "dark");
        themeToggle.addEventListener("click", () => {
          const next = document.body.classList.contains("pink") ? "dark" : "pink";
          applyTheme(next);
          localStorage.setItem("ce_theme", next);
        });

        function setLoading(btn, state, loadingText) {
          const label = btn.querySelector(".label");
          if (state) {
            btn.classList.add("loading");
            btn.disabled = true;
            btn.dataset.oldText = label.textContent;
            label.textContent = loadingText;
          } else {
            btn.classList.remove("loading");
            btn.disabled = false;
            label.textContent = btn.dataset.oldText || label.textContent;
          }
        }

        function cleanHex(str) { return str.replace(/[^0-9a-fA-F:]/g, "").toLowerCase().trim(); }
        function bufToHex(buf) { return [...new Uint8Array(buf)].map((b) => b.toString(16).padStart(2, "0")).join(""); }
        function hexToBuf(hex) {
          hex = hex.replace(/[^0-9a-f]/gi, "");
          if (hex.length % 2 !== 0) throw new Error("Invalid hex length");
          const arr = new Uint8Array(hex.length / 2);
          for (let i = 0; i < arr.length; i++) arr[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
          return arr;
        }

        function shortKey(hex, head = 8, tail = 8) {
          if (!hex || hex === "No key generated") return hex;
          if (hex.length <= head + tail + 3) return hex;
          return `${hex.slice(0, head)}...${hex.slice(-tail)}`;
        }
        function refreshKeyView() {
          const full = keyBox.dataset.fullKey || keyBox.textContent;
          const isMobile = window.matchMedia("(max-width: 600px)").matches;
          if (!full) return;
          keyBox.textContent = isMobile ? shortKey(full) : full;
        }

        function shortName(name, head = 12, tail = 10) {
          if (!name) return name;
          if (name.length <= head + tail + 3) return name;
          return `${name.slice(0, head)}...${name.slice(-tail)}`;
        }
        function refreshFileView() {
          const full = fileInfo.dataset.fullName || "";
          const size = fileInfo.dataset.sizeText || "";
          const isMobile = window.matchMedia("(max-width: 600px)").matches;
          if (!full) { fileInfoLabel.textContent = defaultFileText; return; }
          const shown = isMobile ? shortName(full) : full;
          fileInfoLabel.textContent = size ? `${shown} • ${size}` : shown;
        }

        window.addEventListener("resize", () => { refreshKeyView(); refreshFileView(); });

        function setKeyMode(value) {
          keyMode = value;
          keyModeLabel.textContent = value === "passphrase" ? "Passphrase" : "Default Key";
          [...keyModeMenu.querySelectorAll(".select-item")].forEach((el) => el.classList.toggle("active", el.dataset.value === value));
          updateKeyModeUI();
        }

        keyModeBtn.addEventListener("click", () => {
          const open = keyModeWrap.classList.toggle("open");
          keyModeBtn.setAttribute("aria-expanded", open ? "true" : "false");
        });

        keyModeMenu.addEventListener("click", (e) => {
          const item = e.target.closest(".select-item");
          if (!item) return;
          setKeyMode(item.dataset.value);
          keyModeWrap.classList.remove("open");
          keyModeBtn.setAttribute("aria-expanded", "false");
        });

        document.addEventListener("click", (e) => {
          if (!keyModeWrap.contains(e.target)) {
            keyModeWrap.classList.remove("open");
            keyModeBtn.setAttribute("aria-expanded", "false");
          }
        });

        passToggle.addEventListener("click", () => {
          passInput.type = passInput.type === "password" ? "text" : "password";
        });

        function updateKeyModeUI() {
          const pass = keyMode === "passphrase";
          passWrap.classList.toggle("show", pass);
          keyActions.classList.toggle("hidden", pass);
          keyActions.classList.toggle("disabled", pass);
          keyCard.classList.toggle("passphrase-active", pass);
          keyBox.classList.toggle("hidden", pass);
          passBadge.classList.toggle("hidden", !pass);

          if (!pass) {
            if (!keyBox.dataset.fullKey) keyBox.textContent = "No key generated";
            refreshKeyView();
          }
        }

        async function deriveKeyFromPassphrase(passphrase, salt) {
          const enc = new TextEncoder().encode(passphrase);
          const baseKey = await crypto.subtle.importKey("raw", enc, "PBKDF2", false, ["deriveKey"]);
          return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
            baseKey,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"]
          );
        }

        function getActiveKeyState() {
          if (keyMode === "passphrase") {
            const pass = passInput.value.trim();
            if (!pass) return { ok: false, msg: "Enter passphrase first" };
            return { ok: true, mode: "passphrase", passphrase: pass };
          }
          if (!cryptoKey) return { ok: false, msg: "Generate or import key first" };
          return { ok: true, mode: "default", key: cryptoKey };
        }

        window.generateKey = async function () {
          try {
            cryptoKey = await crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]);
            const raw = new Uint8Array(await crypto.subtle.exportKey("raw", cryptoKey));
            keyBox.dataset.fullKey = bufToHex(raw);
            refreshKeyView();
            showToast("Key generated!");
          } catch { showToast("Key generation failed"); }
        };

        function copyFallback(text) {
          const ta = document.createElement("textarea");
          ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
          document.body.appendChild(ta); ta.select();
          const ok = document.execCommand("copy"); ta.remove(); return ok;
        }

        window.copyKey = async function () {
          const full = keyBox.dataset.fullKey || keyBox.textContent;
          if (!full || full === "No key generated") return showToast("No key to copy");
          try { await navigator.clipboard.writeText(full); showToast("Key copied!"); }
          catch { copyFallback(full) ? showToast("Key copied!") : showToast("Clipboard blocked"); }
        };

        window.copyOutput = async function () {
          if (!outputText.value) return showToast("No output to copy");
          try { await navigator.clipboard.writeText(outputText.value); showToast("Output copied!"); }
          catch { copyFallback(outputText.value) ? showToast("Output copied!") : showToast("Clipboard blocked"); }
        };

        window.importKey = async function () {
          try {
            const clip = (await navigator.clipboard.readText()).trim();
            if (/^[0-9a-fA-F]+$/.test(clip)) return importRawKey(clip);
          } catch {}
          const popup = prompt("Paste your key here:");
          if (!popup) return;
          if (!/^[0-9a-fA-F]+$/.test(popup.trim())) return showToast("Invalid key format");
          importRawKey(popup.trim());
        };

        async function importRawKey(hex) {
          try {
            const raw = hexToBuf(hex);
            if (raw.length !== 32) return showToast("Key must be 64 hex chars (256-bit)");
            cryptoKey = await crypto.subtle.importKey("raw", raw, { name: "AES-GCM" }, true, ["encrypt", "decrypt"]);
            keyBox.dataset.fullKey = hex.toLowerCase();
            refreshKeyView();
            showToast("Key imported");
          } catch { showToast("Invalid key"); }
        }

        window.clearInput = function () {
          if (!inputText.value) return showToast("Input is already empty");
          inputText.value = ""; inputText.focus(); showToast("Input cleared");
        };

        window.encryptText = async function () {
          const st = getActiveKeyState();
          if (!st.ok) return showToast(st.msg);

          setLoading(encryptBtn, true, "Encrypting...");
          try {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const data = new TextEncoder().encode(inputText.value);

            if (st.mode === "default") {
              const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, st.key, data);
              outputText.value = bufToHex(iv) + ":" + bufToHex(encrypted);
            } else {
              const salt = crypto.getRandomValues(new Uint8Array(16));
              const key = await deriveKeyFromPassphrase(st.passphrase, salt);
              const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, data);
              outputText.value = bufToHex(salt) + ":" + bufToHex(iv) + ":" + bufToHex(encrypted);
            }
            showToast("Encrypted");
          } catch { showToast("Encryption failed"); }
          finally { setLoading(encryptBtn, false); }
        };

        window.decryptText = async function () {
          const st = getActiveKeyState();
          if (!st.ok) return showToast(st.msg);

          const raw = cleanHex(inputText.value);
          const parts = raw.split(":");
          setLoading(decryptBtn, true, "Decrypting...");
          try {
            if (st.mode === "default") {
              if (parts.length !== 2) return showToast("Invalid format");
              const [ivHex, encHex] = parts;
              const iv = hexToBuf(ivHex);
              const enc = hexToBuf(encHex);
              if (iv.length !== 12) return showToast("Invalid IV length");
              const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, st.key, enc);
              outputText.value = new TextDecoder().decode(decrypted);
            } else {
              if (parts.length !== 3) return showToast("Invalid format");
              const [saltHex, ivHex, encHex] = parts;
              const salt = hexToBuf(saltHex);
              const iv = hexToBuf(ivHex);
              const enc = hexToBuf(encHex);
              if (iv.length !== 12 || salt.length !== 16) return showToast("Invalid salt/IV length");
              const key = await deriveKeyFromPassphrase(st.passphrase, salt);
              const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, enc);
              outputText.value = new TextDecoder().decode(decrypted);
            }
            showToast("Decrypted");
          } catch { showToast("Wrong key or corrupted data"); }
          finally { setLoading(decryptBtn, false); }
        };

        function formatBytes(bytes) {
          if (bytes < 1024) return `${bytes} B`;
          if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
          if (bytes < 1024 * 1024 * 1024) return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
          return `${(bytes / (1024 * 1024 * 1024)).toFixed(1)} GB`;
        }

        function concatU8(...parts) {
          const total = parts.reduce((n, p) => n + p.length, 0);
          const out = new Uint8Array(total);
          let offset = 0;
          for (const p of parts) { out.set(p, offset); offset += p.length; }
          return out;
        }

        async function requestDownload(blob, filename) {
          const file = new File([blob], filename, { type: blob.type || "application/octet-stream" });

          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try { await navigator.share({ files: [file], title: filename }); return; } catch {}
          }

          if (downloadURL) URL.revokeObjectURL(downloadURL);
          downloadURL = URL.createObjectURL(blob);

          downloadName.textContent = filename;
          downloadLink.href = downloadURL;
          downloadLink.download = filename;
          downloadPrompt.classList.remove("hidden");
        }

        function closeDownloadPrompt() { downloadPrompt.classList.add("hidden"); }
        downloadCancel.addEventListener("click", closeDownloadPrompt);
        downloadLink.addEventListener("click", () => setTimeout(closeDownloadPrompt, 400));

        function fpSet(value) {
          const v = Math.max(0, Math.min(100, value));
          const offset = FP_CIRC * (1 - v / 100);
          fpRingBar.style.strokeDashoffset = `${offset}`;
          fpPercent.textContent = `${Math.round(v)}%`;
        }

        function fpShow(title) {
          fpTitle.textContent = title || "Processing file...";
          fileProgressCard.classList.remove("done");
          fileProgressOverlay.classList.remove("hidden");
          fileProgressOverlay.setAttribute("aria-hidden", "false");
          fpSet(0);
        }

        function fpHide() {
          fileProgressOverlay.classList.add("hidden");
          fileProgressOverlay.setAttribute("aria-hidden", "true");
        }

        async function fpCompleteAndHide() {
          fpSet(100);
          fileProgressCard.classList.add("done");
          await new Promise(r => setTimeout(r, 760));
          fpHide();
        }

        async function getDeviceProfile() {
          if (cachedDeviceProfile) return cachedDeviceProfile;

          const memGB = Math.max(1, Math.min(16, navigator.deviceMemory || 4));
          const cores = Math.max(2, Math.min(16, navigator.hardwareConcurrency || 4));

          const t0 = performance.now();
          let acc = 0;
          for (let i = 0; i < 420000; i++) acc += Math.sqrt((i % 97) + 1);
          const t1 = performance.now();
          const ms = Math.max(8, t1 - t0);

          const perf = Math.max(0.65, Math.min(1.35, 120 / ms));

          cachedDeviceProfile = { memGB, cores, perf };
          return cachedDeviceProfile;
        }

        function getModerateFileLimitBytes(profile) {
          const ramPart = profile.memGB * GB * 0.12;
          const cpuPart = (0.72 + Math.min(0.38, profile.cores / 24)) * profile.perf;
          let limit = ramPart * cpuPart;

          const isMobileUA = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
          const minLimit = 40 * MB;
          const maxLimit = isMobileUA ? 600 * MB : 1.2 * GB;

          limit = Math.max(minLimit, Math.min(maxLimit, limit));
          limit = Math.min(limit, ABSOLUTE_HARD_CAP);
          return Math.floor(limit);
        }

        async function enforceDeviceFileLimit(file) {
          if (!file) return false;
          if (file.size > ABSOLUTE_HARD_CAP) {
            showToast(`Your device can process up to ${formatBytes(ABSOLUTE_HARD_CAP)} for stable performance.`);
            return false;
          }
          const profile = await getDeviceProfile();
          const limit = getModerateFileLimitBytes(profile);

          if (file.size > limit) {
            showToast(`Your device can process up to ${formatBytes(limit)} for stable performance.`);
            return false;
          }
          return true;
        }

        async function setSelectedFileSafe(file) {
          if (!file) {
            selectedFile = null;
            fileInfo.dataset.fullName = "";
            fileInfo.dataset.sizeText = "";
            fileCard.classList.remove("has-file");
            refreshFileView();
            return;
          }

          const ok = await enforceDeviceFileLimit(file);
          if (!ok) {
            selectedFile = null;
            fileInput.value = "";
            fileInfo.dataset.fullName = "";
            fileInfo.dataset.sizeText = "";
            fileCard.classList.remove("has-file");
            refreshFileView();
            return;
          }

          selectedFile = file;
          fileInfo.dataset.fullName = file.name;
          fileInfo.dataset.sizeText = formatBytes(file.size);
          fileCard.classList.add("has-file");
          refreshFileView();
        }

        function clearSelectedFile() {
          selectedFile = null;
          fileInput.value = "";
          fileInfo.dataset.fullName = "";
          fileInfo.dataset.sizeText = "";
          fileCard.classList.remove("has-file");
          refreshFileView();
          showToast("File selection cleared");
        }

        function createFileOp() {
          return { cancelled: false, reader: null };
        }
        function cancelFileOp() {
          if (!currentFileOp) return;
          currentFileOp.cancelled = true;
          if (currentFileOp.reader) currentFileOp.reader.abort();
        }
        function ensureNotCanceled(op) {
          if (op && op.cancelled) {
            const err = new Error("Canceled");
            err.name = "AbortError";
            throw err;
          }
        }

        function readFileWithProgress(file, onProgress, op) {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            if (op) op.reader = reader;

            reader.onprogress = (e) => {
              if (!e.lengthComputable) return;
              const p = (e.loaded / e.total) * 72;
              onProgress?.(p);
            };
            reader.onload = () => resolve(new Uint8Array(reader.result));
            reader.onerror = () => reject(new Error("Read failed"));
            reader.onabort = () => {
              const err = new Error("Canceled");
              err.name = "AbortError";
              reject(err);
            };
            reader.readAsArrayBuffer(file);
          });
        }

        async function runCryptoPhase(task, from = 72, to = 96, onProgress, op) {
          let p = from;
          onProgress?.(p);

          const timer = setInterval(() => {
            if (op?.cancelled) return;
            p = Math.min(to, p + (Math.random() * 1.7 + 0.7));
            onProgress?.(p);
          }, 120);

          try {
            return await task();
          } finally {
            clearInterval(timer);
          }
        }

        fpCancel.addEventListener("click", () => {
          cancelFileOp();
          fpHide();
          setLoading(encryptFileBtn, false);
          setLoading(decryptFileBtn, false);
          showToast("Operation canceled");
        });

        window.pickFile = async function () {
          try {
            if (window.showOpenFilePicker) {
              const [handle] = await window.showOpenFilePicker({ multiple: false });
              if (!handle) return;
              const file = await handle.getFile();
              await setSelectedFileSafe(file);
              return;
            }
          } catch (err) {
            if (err?.name !== "AbortError") console.warn(err);
          }
          fileInput.value = "";
          fileInput.click();
        };

        fileClearBtn.addEventListener("click", clearSelectedFile);

        fileInfo.setAttribute("role","button");
        fileInfo.tabIndex = 0;
        fileInfo.addEventListener("click", pickFile);
        fileInfo.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pickFile(); }
        });

        fileInput.addEventListener("change", async () => {
          const f = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
          await setSelectedFileSafe(f);
        });

        window.addEventListener("dragover", (e) => e.preventDefault());
        window.addEventListener("drop", (e) => e.preventDefault());

        ["dragenter","dragover"].forEach(evt => {
          fileCard.addEventListener(evt, (e) => {
            e.preventDefault(); e.stopPropagation();
            fileCard.classList.add("dragging");
          });
        });

        fileCard.addEventListener("dragleave", (e) => {
          e.preventDefault(); e.stopPropagation();
          const to = e.relatedTarget;
          if (to && fileCard.contains(to)) return;
          fileCard.classList.remove("dragging");
        });

        fileCard.addEventListener("drop", async (e) => {
          e.preventDefault(); e.stopPropagation();
          fileCard.classList.remove("dragging");
          const f = e.dataTransfer.files && e.dataTransfer.files[0];
          if (!f) return;
          await setSelectedFileSafe(f);
        });

        window.encryptFile = async function () {
          const st = getActiveKeyState();
          if (!st.ok) return showToast(st.msg);
          if (!selectedFile) return showToast("Choose a file first");

          const allowed = await enforceDeviceFileLimit(selectedFile);
          if (!allowed) return;

          const useProgress = selectedFile.size >= LARGE_FILE_PROGRESS_THRESHOLD;
          setLoading(encryptFileBtn, true, "Encrypting...");

          currentFileOp = createFileOp();
          try {
            if (useProgress) fpShow("Encrypting file...");

            const fileBytes = useProgress
              ? await readFileWithProgress(selectedFile, fpSet, currentFileOp)
              : new Uint8Array(await selectedFile.arrayBuffer());
            ensureNotCanceled(currentFileOp);

            const iv = crypto.getRandomValues(new Uint8Array(12));

            if (st.mode === "default") {
              const cipher = await runCryptoPhase(
                async () => new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, st.key, fileBytes)),
                72, 96, useProgress ? fpSet : null, currentFileOp
              );
              ensureNotCanceled(currentFileOp);
              const payload = concatU8(FILE_MAGIC, new Uint8Array([MODE_DEFAULT]), iv, cipher);
              await requestDownload(new Blob([payload], { type: "application/octet-stream" }), `${selectedFile.name}.enc`);
            } else {
              const salt = crypto.getRandomValues(new Uint8Array(16));
              const key = await deriveKeyFromPassphrase(st.passphrase, salt);
              const cipher = await runCryptoPhase(
                async () => new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, fileBytes)),
                72, 96, useProgress ? fpSet : null, currentFileOp
              );
              ensureNotCanceled(currentFileOp);
              const payload = concatU8(FILE_MAGIC, new Uint8Array([MODE_PASSPHRASE]), salt, iv, cipher);
              await requestDownload(new Blob([payload], { type: "application/octet-stream" }), `${selectedFile.name}.enc`);
            }

            if (useProgress) await fpCompleteAndHide();
            showToast("Encrypted file ready");
          } catch (e) {
            if (e?.name === "AbortError") {
              showToast("Operation canceled");
            } else {
              showToast("File encryption failed");
            }
            if (useProgress) fpHide();
          } finally {
            currentFileOp = null;
            setLoading(encryptFileBtn, false);
          }
        };

        window.decryptFile = async function () {
          const st = getActiveKeyState();
          if (!st.ok) return showToast(st.msg);
          if (!selectedFile) return showToast("Choose a file first");

          const allowed = await enforceDeviceFileLimit(selectedFile);
          if (!allowed) return;

          const useProgress = selectedFile.size >= LARGE_FILE_PROGRESS_THRESHOLD;
          setLoading(decryptFileBtn, true, "Decrypting...");

          currentFileOp = createFileOp();
          try {
            if (useProgress) fpShow("Decrypting file...");

            const bytes = useProgress
              ? await readFileWithProgress(selectedFile, fpSet, currentFileOp)
              : new Uint8Array(await selectedFile.arrayBuffer());
            ensureNotCanceled(currentFileOp);

            if (bytes.length < 3 + 1 + 12 + 16) return showToast("Invalid encrypted file");
            if (bytes[0] !== FILE_MAGIC[0] || bytes[1] !== FILE_MAGIC[1] || bytes[2] !== FILE_MAGIC[2]) return showToast("Unknown file format");

            const mode = bytes[3];
            let offset = 4, iv, enc, salt, key;

            if (mode === MODE_DEFAULT) {
              if (st.mode !== "default") return showToast("Switch to Default Key mode");
              iv = bytes.slice(offset, offset + 12); offset += 12;
              enc = bytes.slice(offset);
              key = st.key;
            } else if (mode === MODE_PASSPHRASE) {
              if (st.mode !== "passphrase") return showToast("Switch to Passphrase mode");
              salt = bytes.slice(offset, offset + 16); offset += 16;
              iv = bytes.slice(offset, offset + 12); offset += 12;
              enc = bytes.slice(offset);
              key = await deriveKeyFromPassphrase(st.passphrase, salt);
            } else {
              return showToast("Unknown encryption mode");
            }

            const plain = await runCryptoPhase(
              async () => new Uint8Array(await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, enc)),
              72, 96, useProgress ? fpSet : null, currentFileOp
            );
            ensureNotCanceled(currentFileOp);

            const outName = selectedFile.name.endsWith(".enc")
              ? selectedFile.name.slice(0, -4) || "decrypted-file"
              : `${selectedFile.name}.decrypted`;

            await requestDownload(new Blob([plain], { type: "application/octet-stream" }), outName);

            if (useProgress) await fpCompleteAndHide();
            showToast("Decrypted file ready");
          } catch (e) {
            if (e?.name === "AbortError") {
              showToast("Operation canceled");
            } else {
              showToast("Wrong key or corrupted file");
            }
            if (useProgress) fpHide();
          } finally {
            currentFileOp = null;
            setLoading(decryptFileBtn, false);
          }
        };

        setKeyMode("default");
        refreshKeyView();
        refreshFileView();
      });
    </script>
  </body>
</html>
